  <rect x="286" y="445" width="104" height="36" rx="18" fill="rgba(99,102,241,0.25)" stroke="rgba(99,102,241,0.5)" stroke-width="1"/>
  <text x="338" y="469" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="rgba(199,210,254,0.95)" text-anchor="middle">Laravel</text>

  <!-- Node.js -->
  <rect x="402" y="445" width="104" height="36" rx="18" fill="rgba(99,102,241,0.25)" stroke="rgba(99,102,241,0.5)" stroke-width="1"/>
  <text x="454" y="469" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="rgba(199,210,254,0.95)" text-anchor="middle">Node.js</text>

  <!-- MySQL -->
  <rect x="518" y="445" width="100" height="36" rx="18" fill="rgba(99,102,241,0.25)" stroke="rgba(99,102,241,0.5)" stroke-width="1"/>
  <text x="568" y="469" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="rgba(199,210,254,0.95)" text-anchor="middle">MySQL</text>

  <!-- MongoDB -->
  <rect x="630" y="445" width="114" height="36" rx="18" fill="rgba(99,102,241,0.25)" stroke="rgba(99,102,241,0.5)" stroke-width="1"/>
  <text x="687" y="469" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="rgba(199,210,254,0.95)" text-anchor="middle">MongoDB</text>

  <!-- DevOps -->
  <rect x="756" y="445" width="104" height="36" rx="18" fill="rgba(99,102,241,0.25)" stroke="rgba(99,102,241,0.5)" stroke-width="1"/>
  <text x="808" y="469" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="rgba(199,210,254,0.95)" text-anchor="middle">DevOps</text>

  <!-- Git -->
  <rect x="872" y="445" width="80" height="36" rx="18" fill="rgba(99,102,241,0.25)" stroke="rgba(99,102,241,0.5)" stroke-width="1"/>
  <text x="912" y="469" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="rgba(199,210,254,0.95)" text-anchor="middle">Git</text>

  <!-- Agile -->
  <rect x="964" y="445" width="92" height="36" rx="18" fill="rgba(99,102,241,0.25)" stroke="rgba(99,102,241,0.5)" stroke-width="1"/>
  <text x="1010" y="469" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="rgba(199,210,254,0.95)" text-anchor="middle">Agile</text>

  <!-- Free badge -->
  <rect x="80" y="508" width="78" height="30" rx="15" fill="rgba(34,197,94,0.2)" stroke="rgba(34,197,94,0.4)" stroke-width="1"/>
  <text x="119" y="528" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="rgba(134,239,172,0.95)" text-anchor="middle">✓ FREE</text>

  <!-- Interview prep badge -->
  <rect x="170" y="508" width="176" height="30" rx="15" fill="rgba(99,102,241,0.2)" stroke="rgba(99,102,241,0.4)" stroke-width="1"/>
  <text x="258" y="528" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="rgba(165,180,252,0.95)" text-anchor="middle">✓ Interview Prep</text>

  <!-- Progress tracking badge -->
  <rect x="358" y="508" width="196" height="30" rx="15" fill="rgba(99,102,241,0.2)" stroke="rgba(99,102,241,0.4)" stroke-width="1"/>
  <text x="456" y="528" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="rgba(165,180,252,0.95)" text-anchor="middle">✓ Progress Tracking</text>

  <!-- Bottom border accent -->
  <rect x="0" y="618" width="1200" height="12" fill="url(#accent)" opacity="0.8"/>
</svg>
